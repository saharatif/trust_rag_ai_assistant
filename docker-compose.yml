version: '3.9'

services:
  # TrustRAG FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustrag-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DATABASE_URL=sqlite:///trustrag.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_SECOND=10
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - trustrag_db:/app
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - trustrag-net
    restart: unless-stopped

  # Optional: PostgreSQL for production-like local development
  db:
    image: postgres:15-alpine
    container_name: trustrag-db
    environment:
      - POSTGRES_DB=trustrag
      - POSTGRES_USER=trustrag_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-trustrag_dev_password}
    volumes:
      - trustrag_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustrag_user -d trustrag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trustrag-net
    restart: unless-stopped
    profiles:
      - with-postgres

volumes:
  trustrag_db:
    driver: local
  trustrag_postgres:
    driver: local

networks:
  trustrag-net:
    driver: bridge
