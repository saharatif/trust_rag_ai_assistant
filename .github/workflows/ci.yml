name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v2-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Lint with Pylance checks
        run: |
          find src tests -name "*.py" | xargs python -m py_compile
          echo "✓ Syntax validation passed"

      - name: Run pytest
        run: |
          pytest -v tests/ --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Security check - detect secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || true
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: trustrag:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -t trustrag:test .
          docker run --rm trustrag:test python -m pytest --version

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax
        run: find src tests -name "*.py" | xargs python -m py_compile && echo "Syntax OK"

      - name: Validate environment variables
        run: |
          echo "Checking .env template..."
          if [ -f .env ]; then
            grep -E "^[A-Z_]+=.*" .env || echo "✓ .env validation passed"
          fi

  notify:
    needs: [test, docker-build, code-quality]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: CI Status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.docker-build.result }}" == "success" && "${{ needs.code-quality.result }}" == "success" ]]; then
            echo "✓ All CI checks passed!"
            exit 0
          else
            echo "✗ Some CI checks failed"
            exit 1
          fi
